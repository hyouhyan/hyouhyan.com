name: Deploy to GitHub Pages

on:
  # main ブランチに push すると自動デプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能
  workflow_dispatch:

# GitHub Pages へデプロイするための権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（古いデプロイは中断）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # 必要なら以下のオプションを有効化:
        # with:
        #   path: .              # リポジトリ内のプロジェクトの場所
        #   node-version: 22     # 使用する Node のバージョン
        #   package-manager: npm # npm / yarn / pnpm / bun

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
